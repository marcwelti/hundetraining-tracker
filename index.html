<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hundetraining Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>
  :root{
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --ink: #211E1B;
    --ink-soft: #7A756C;
    --primary: #211E1B;
    --primary-dark: #0F0D0B;
    --primary-soft: #EDEAE4;
    --accent: #AE8B5C;
    --accent-soft: #F1E7D5;
    --line: #E6E2D9;
    --danger: #B3492F;
    --font-display: 'Poppins', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 14px;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.5;
    min-height: 100vh;
  }
  h1,h2,h3{ font-family: var(--font-display); font-weight: 700; margin: 0; color: var(--primary-dark); letter-spacing: -0.01em; }
  button{ font-family: var(--font-body); cursor: pointer; }
  input{ font-family: var(--font-body); }
  a{ color: var(--primary); }

  ::selection{ background: var(--accent-soft); }

  /* ---------- Layout shells ---------- */
  .center-screen{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app-shell{ max-width: 980px; margin: 0 auto; padding: 0 20px 80px; }

  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 22px 0 18px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  header.topbar .brand{ display:flex; align-items:center; gap:10px; }
  header.topbar .brand svg, header.topbar .brand img{ width:32px; height:32px; display:block; }
  header.topbar .brand-text{ font-family: var(--font-display); font-size: 20px; font-weight:700; color: var(--primary-dark); letter-spacing: -0.01em; }
  header.topbar .user-box{ display:flex; align-items:center; gap:14px; font-size:14px; color: var(--ink-soft); }
  header.topbar .logout-btn{
    background:none; border:1px solid var(--line); color: var(--ink);
    padding: 7px 14px; border-radius: 999px; font-size: 13px;
    transition: all .15s ease;
  }
  header.topbar .logout-btn:hover{ background: var(--primary-soft); border-color: var(--primary-soft); }

  /* ---------- Auth card ---------- */
  .auth-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 1px 2px rgba(30,46,36,0.04), 0 8px 30px rgba(30,46,36,0.06);
  }
  .auth-card .paw-mark{ width:56px; height:56px; margin-bottom: 18px; }
  .auth-card .paw-mark img{ width:100%; height:100%; object-fit:contain; display:block; }
  .auth-card h1{ font-size: 26px; margin-bottom: 6px; }
  .auth-card p.sub{ color: var(--ink-soft); font-size: 14px; margin: 0 0 26px; }

  .field{ margin-bottom: 16px; }
  .field label{ display:block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .field input{
    width: 100%; padding: 11px 13px; border-radius: 9px;
    border: 1px solid var(--line); background: #FFFDF9; font-size: 14px;
    outline: none; transition: border-color .15s ease;
  }
  .field input:focus{ border-color: var(--primary); }

  .primary-btn{
    width: 100%; background: var(--primary); color: #fff; border: none;
    padding: 12px 16px; border-radius: 9px; font-size: 15px; font-weight: 600;
    transition: background .15s ease;
  }
  .primary-btn:hover{ background: var(--primary-dark); }
  .primary-btn:disabled{ opacity: .6; cursor: not-allowed; }

  .switch-mode{ text-align:center; margin-top: 18px; font-size: 13px; color: var(--ink-soft); }
  .switch-mode button{ background:none; border:none; color: var(--primary); font-weight:600; text-decoration: underline; padding:0; font-size:13px; }

  .auth-error{
    background: #FBEAE4; border: 1px solid #F0C7B8; color: var(--danger);
    padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
  }
  .auth-notice{
    background: var(--accent-soft); border: 1px solid #E4C88C; color: #7A5417;
    padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
  }

  /* ---------- Stat cards ---------- */
  .stats-grid{
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    margin-bottom: 30px;
  }
  @media (max-width: 760px){ .stats-grid{ grid-template-columns: repeat(2, 1fr); } }

  .stats-grid-top{ grid-template-columns: repeat(2, 1fr); max-width: 620px; }
  .stats-grid-top-3{ grid-template-columns: repeat(3, 1fr); max-width: 920px; }
  @media (max-width: 760px){ .stats-grid-top-3{ grid-template-columns: repeat(2, 1fr); } }

  .stat-card{
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px 18px 16px;
  }
  .stat-card .label{ font-size: 12px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 8px; }
  .stat-card .value{ font-family: var(--font-mono); font-size: 28px; font-weight: 700; color: var(--primary-dark); }
  .stat-card .value .unit{ font-size: 14px; font-weight: 500; color: var(--ink-soft); margin-left: 3px; }

  .category-stats-grid{
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
  }
  @media (max-width: 900px){ .category-stats-grid{ grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 640px){ .category-stats-grid{ grid-template-columns: repeat(2, 1fr); } }
  .cat-stat-card{
    background: #FFFDF9; border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 14px 12px;
  }
  .cat-stat-value{ font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--primary-dark); }
  .cat-stat-value .cat-stat-unit{ font-size: 12px; font-weight: 500; color: var(--ink-soft); margin-left: 3px; }
  .cat-stat-label{ font-size: 12px; color: var(--ink-soft); margin-top: 4px; line-height: 1.35; }
  .cat-stat-extra{ display:flex; flex-wrap:wrap; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--line); }
  .cat-stat-extra span{ font-size: 11px; color: var(--ink-soft); font-family: var(--font-mono); }
  .cat-stat-extra .cat-stat-success{ color: var(--danger); font-weight: 600; }
  .cat-stat-extra .cat-stat-success.good{ color: #3C6B33; }

  .paw-streak{ display:flex; gap: 4px; margin-top: 10px; }
  .paw-streak svg{ width: 16px; height: 16px; }
  .paw-streak .filled{ fill: var(--accent); }
  .paw-streak .empty{ fill: var(--line); }

  /* ---------- Sections ---------- */
  section.panel{
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 24px 26px; margin-bottom: 24px;
  }
  section.panel h2{ font-size: 19px; margin-bottom: 4px; }

  .guide-grid{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 860px){ .guide-grid{ grid-template-columns: 1fr; } }
  .guide-card{ border-radius: 11px; padding: 16px 18px; border: 1px solid var(--line); }
  .guide-card h3{ font-family: var(--font-body); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 10px; color: var(--ink); }
  .guide-card ul{ margin: 0; padding-left: 18px; }
  .guide-card li{ font-size: 13.5px; line-height: 1.5; margin-bottom: 7px; color: var(--ink); }
  .guide-card li:last-child{ margin-bottom: 0; }
  .guide-orange{ background: #FBEEDD; border-color: #F0D9B5; }
  .guide-orange h3{ color: #8A5A17; }
  .guide-green{ background: #E9F3E6; border-color: #C9E3C2; }
  .guide-green h3{ color: #3C6B33; }
  .guide-blue{ background: #E6EEF6; border-color: #C3D7EC; }
  .guide-blue h3{ color: #2C5680; }

  .weekly-goal-panel{ background: var(--accent-soft); border-color: #E4C88C; }
  .goal-grid{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
  @media (max-width: 760px){ .goal-grid{ grid-template-columns: 1fr; } }
  .weekly-goal-panel .field input{ background: #FFFDF9; }
  .goal-display{
    margin-top: 14px; padding-top: 14px; border-top: 1px solid #E4C88C;
    font-size: 13.5px; line-height: 1.6;
  }
  .goal-display-label{ font-weight: 700; color: var(--primary-dark); }
  section.panel p.panel-sub{ color: var(--ink-soft); font-size: 13px; margin: 0 0 18px; }

  .checklist{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 18px; margin-bottom: 20px; }
  @media (max-width: 640px){ .checklist{ grid-template-columns: 1fr; } }

  .check-item{
    display:flex; flex-direction: column;
    padding: 10px 12px; border: 1px solid var(--line); border-radius: 9px;
    transition: all .15s ease; background: #FFFDF9;
  }
  .check-item:hover{ border-color: var(--primary); }
  .check-item.active{ background: var(--primary-soft); border-color: var(--primary); }
  .check-item input[type=checkbox]{ width: 17px; height: 17px; accent-color: var(--primary); flex-shrink:0; margin-top: 2px; }
  .check-item .txt{ font-size: 14px; }
  .check-item .txt .hint{ display:block; font-size: 11.5px; color: var(--ink-soft); font-weight: 400; margin-top: 2px; }

  .check-item-header{ display:flex; align-items:flex-start; gap: 10px; cursor: pointer; }
  .reps-row{
    display:flex; align-items:flex-end; gap: 10px; margin-top: 10px;
    padding-top: 10px; border-top: 1px dashed var(--line); flex-wrap: wrap;
  }
  .reps-field{ display:flex; flex-direction: column; gap: 4px; }
  .reps-field label{ font-size: 11px; color: var(--ink-soft); font-weight: 600; }
  .reps-field input{
    width: 68px; padding: 6px 8px; border-radius: 7px; border: 1px solid var(--line);
    font-size: 13px; font-family: var(--font-mono); background: #FFFFFF;
  }
  .reps-field input:focus{ border-color: var(--primary); outline: none; }
  .reps-rate{ font-size: 12px; font-weight: 600; color: var(--ink-soft); padding-bottom: 6px; }

  .reflexion-field{ margin: 4px 0 20px; }
  .reflexion-field label{ display:block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .reflexion-field .optional-tag{ font-weight: 400; color: var(--ink-soft); font-size: 12px; }
  .reflexion-field textarea{
    width: 100%; padding: 10px 12px; border-radius: 9px; border: 1px solid var(--line);
    background: #FFFDF9; font-size: 14px; font-family: var(--font-body); resize: vertical;
    outline: none;
  }
  .reflexion-field textarea:focus{ border-color: var(--primary); }

  .save-confirmation{
    margin-top: 14px; padding: 12px 16px; border-radius: 9px;
    background: var(--primary-soft); color: var(--primary-dark);
    font-weight: 600; font-size: 14px;
  }


  .save-row{ display:flex; align-items:center; gap: 14px; }
  .save-row .save-btn{
    background: var(--primary); color:#fff; border:none; padding: 11px 22px;
    border-radius: 9px; font-weight:600; font-size: 14px;
  }
  .save-row .save-btn:hover{ background: var(--primary-dark); }
  .save-status{ font-size: 13px; color: var(--ink-soft); }
  .save-status.ok{ color: var(--primary); font-weight:600; }

  .date-pick{ display:flex; align-items:center; gap: 10px; margin-bottom: 18px; }
  .date-pick input{ padding: 8px 10px; border-radius: 7px; border: 1px solid var(--line); font-size: 13px; }

  /* ---------- Chart ---------- */
  .chart-wrap{ height: 240px; }

  /* ---------- Table ---------- */
  table.history{ width: 100%; border-collapse: collapse; font-size: 13px; }
  table.history th{
    text-align: left; padding: 8px 10px; color: var(--ink-soft);
    font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .03em;
    border-bottom: 1px solid var(--line); white-space: nowrap;
  }
  table.history td{ padding: 9px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .reps-cell{ font-family: var(--font-mono); font-size: 12.5px; color: var(--ink); display:inline-flex; align-items:center; gap:5px; }
  .reps-cell.good{ color: #3C6B33; font-weight: 600; }
  .reps-cell-pct{ font-size: 10.5px; color: var(--ink-soft); }
  .reflexion-cell{ white-space: normal; max-width: 260px; font-size: 12.5px; color: var(--ink-soft); }
  table.history tr:last-child td{ border-bottom: none; }
  .dot{ display:inline-block; width:9px; height:9px; border-radius:50%; }
  .dot.yes{ background: var(--primary); }
  .dot.no{ background: var(--line); }
  .table-scroll{ overflow-x: auto; }
  .empty-state{ color: var(--ink-soft); font-size: 14px; padding: 10px 2px; }

  .loading-line{ color: var(--ink-soft); font-size: 14px; padding: 40px 0; text-align:center; }

  footer.app-footer{ text-align:center; color: var(--ink-soft); font-size: 12px; padding: 10px 0 30px; }
</style>
</head>

/* ---------- Helpers ---------- */
function todayISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function isoDaysAgo(n){
  const d = new Date();
  d.setDate(d.getDate() - n);
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function formatDateDE(iso){
  const [y,m,d] = iso.split("-");
  return `${d}.${m}.${y}`;
}
function weekdayShortDE(iso){
  const days = ["So","Mo","Di","Mi","Do","Fr","Sa"];
  const d = new Date(iso + "T00:00:00");
  return days[d.getDay()];
}
function countChecked(entry){
  return CATEGORIES.reduce((sum,c) => sum + (entry[c.key] ? 1 : 0), 0);
}
function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str){
  return String(str).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function getWeekRange(){
  // Montag–Sonntag der aktuellen Woche
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  const dow = local.getDay(); // 0=So, 1=Mo, ...
  const diffToMonday = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(local);
  monday.setDate(local.getDate() + diffToMonday);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  return { start: monday.toISOString().slice(0,10), end: sunday.toISOString().slice(0,10) };
}

/* =========================================================
   AUTH SCREEN
   ========================================================= */
function renderAuth(errorMsg, noticeMsg){
  root.innerHTML = `
    <div class="center-screen">
      <div class="auth-card">
        <div class="paw-mark">${brandMark}</div>
        <h1>${authMode === "login" ? "Willkommen zurück" : "Konto erstellen"}</h1>
        <p class="sub">${authMode === "login"
          ? "Melde dich an, um dein Hundetraining zu tracken."
          : "Erstelle deinen Zugang für den Trainings-Tracker."}</p>

        ${errorMsg ? `<div class="auth-error">${errorMsg}</div>` : ""}
        ${noticeMsg ? `<div class="auth-notice">${noticeMsg}</div>` : ""}

        <form id="auth-form">
          <div class="field">
            <label>E-Mail</label>
            <input type="email" id="email" required autocomplete="email" placeholder="du@beispiel.ch" />
          </div>
          <div class="field">
            <label>Passwort</label>
            <input type="password" id="password" required minlength="6" autocomplete="current-password" placeholder="mind. 6 Zeichen" />
          </div>
          <button class="primary-btn" type="submit" id="auth-submit">
            ${authMode === "login" ? "Anmelden" : "Konto erstellen"}
          </button>
        </form>

        <div class="switch-mode">
          ${authMode === "login"
            ? `Noch kein Konto? <button id="switch-btn">Jetzt registrieren</button>`
            : `Schon ein Konto? <button id="switch-btn">Jetzt anmelden</button>`}
        </div>
      </div>
    </div>
  `;

  document.getElementById("switch-btn").onclick = () => {
    authMode = authMode === "login" ? "signup" : "login";
    renderAuth();
  };

  document.getElementById("auth-form").onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("auth-submit");
    btn.disabled = true;
    btn.textContent = "Einen Moment …";

    try{
      if (authMode === "login"){
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        // onAuthStateChange übernimmt das Weiterleiten
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        authMode = "login";
        renderAuth(null, "Konto erstellt! Falls eine Bestätigungs-E-Mail nötig ist, prüfe dein Postfach. Danach kannst du dich anmelden.");
        return;
      }
    } catch(err){
      renderAuth(translateError(err.message));
    }
  };
}

function translateError(msg){
  if (!msg) return "Etwas ist schiefgelaufen. Bitte versuche es erneut.";
  if (msg.includes("Invalid login credentials")) return "E-Mail oder Passwort ist falsch.";
  if (msg.includes("already registered")) return "Für diese E-Mail existiert bereits ein Konto.";
  if (msg.includes("Password should be")) return "Das Passwort muss mindestens 6 Zeichen haben.";
  return msg;
}

    <div class="app-shell">
      <header class="topbar">
        <div class="brand">${brandMark}<span class="brand-text">Hundetraining Tracker</span></div>
        <div class="user-box">
          <span>${currentUser.email}</span>
          <button class="logout-btn" id="logout-btn">Abmelden</button>
        </div>
      </header>
      <div id="content"><div class="loading-line">Lade deine Trainingsdaten …</div></div>
      <footer class="app-footer">Was du regelmässig wiederholst, wird zur Gewohnheit.</footer>
    </div>
  `;
  document.getElementById("logout-btn").onclick = async () => {
    await sb.auth.signOut();
  };

  await loadEntries();
  await loadWeeklyGoal();
  renderContent();
}

async function loadEntries(){
  const { data, error } = await sb
    .from("training_entries")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("entry_date", { ascending: true });

  if (error){
    document.getElementById("content").innerHTML =
      `<div class="auth-error">Fehler beim Laden: ${error.message}</div>`;
    return;
  }
  currentEntries = data || [];
}

async function loadWeeklyGoal(){
  const { data, error } = await sb
    .from("weekly_goals")
    .select("*")
    .eq("user_id", currentUser.id)
    .maybeSingle();

  if (!error && data){
    weeklyGoal = data;
  } else {
    weeklyGoal = null;
  }
}

async function saveWeeklyGoal(focus, goal, targetDays){
  const row = {
    user_id: currentUser.id,
    focus: focus || null,
    goal: goal || null,
    target_days: targetDays || null,
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb
    .from("weekly_goals")
    .upsert(row, { onConflict: "user_id" });

  if (error) return { error };
  await loadWeeklyGoal();
  return { error: null };
}

function computeStats(){
  const trainingsTage = currentEntries.length;

  // Streak: consecutive days up to today (or up to yesterday if today not yet logged)
  const dateSet = new Set(currentEntries.map(e => e.entry_date));
  let streak = 0;
  let cursor = dateSet.has(todayISO()) ? 0 : 1;
  while (dateSet.has(isoDaysAgo(cursor))){
    streak++;
    cursor++;
  }

  const categoryCounts = {};
  const categoryReps = {};
  CATEGORIES.forEach(c => {
    categoryCounts[c.key] = currentEntries.reduce((s,e) => s + (e[c.key] ? 1 : 0), 0);

    if (c.trackReps){
      const repsField = c.key + "_reps";
      const successField = c.key + "_success";
      const daysWithReps = currentEntries.filter(e => e[repsField] !== null && e[repsField] !== undefined);
      const daysWithSuccess = currentEntries.filter(e => e[successField] !== null && e[successField] !== undefined && e[repsField]);

      const totalReps = daysWithReps.reduce((s,e) => s + Number(e[repsField] || 0), 0);
      const avgReps = daysWithReps.length ? Math.round(totalReps / daysWithReps.length) : 0;
      const avgSuccessRate = daysWithSuccess.length
        ? Math.round(daysWithSuccess.reduce((s,e) => s + (Number(e[successField]) / Number(e[repsField])) * 100, 0) / daysWithSuccess.length)
        : null;

      categoryReps[c.key] = { totalReps, avgReps, avgSuccessRate, daysWithReps: daysWithReps.length };
    }
  });

  // Wochenziel-Fortschritt: Trainingstage innerhalb der aktuellen Kalenderwoche (Mo–So)
  const week = getWeekRange();
  const weekDaysTrained = currentEntries.filter(e => e.entry_date >= week.start && e.entry_date <= week.end).length;

  return { trainingsTage, streak, categoryCounts, categoryReps, weekDaysTrained };
}

async function handleSaveWeeklyGoal(){
  const statusEl = document.getElementById("goal-save-status");
  const focus = document.getElementById("goal-focus").value.trim();
  const goal = document.getElementById("goal-text").value.trim();
  const daysRaw = document.getElementById("goal-days").value;
  const days = daysRaw ? Math.max(1, Math.min(7, parseInt(daysRaw, 10))) : null;

  statusEl.textContent = "Speichere …";
  statusEl.className = "save-status";

  const { error } = await saveWeeklyGoal(focus, goal, days);

  if (error){
    statusEl.textContent = "Fehler: " + error.message;
    return;
  }
  statusEl.textContent = "Gespeichert ✓";
  statusEl.className = "save-status ok";
  renderContent();
}

function renderPawStreak(streak){
  const shown = Math.min(streak, 7);
  const rest = streak > 7 ? ` +${streak - 7}` : "";
  let html = "";
  for (let i=0; i<Math.max(shown,1); i++){
    html += pawSVG(i < shown ? "filled" : "empty");
  }
  return html + (rest ? `<span style="font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); margin-left:4px;">${rest}</span>` : "");
}

function renderCategoryStats(categoryCounts, categoryReps){
  return CATEGORIES.map(c => {
    const extra = c.trackReps
      ? `
        <div class="cat-stat-extra">
          <span>Σ ${categoryReps[c.key].totalReps} ${c.repsLabel === "Sequenzen/Minuten" ? "gesamt" : "Wdh."}</span>
          <span>Ø ${categoryReps[c.key].avgReps}/Tag</span>
          ${categoryReps[c.key].avgSuccessRate !== null ? `<span class="cat-stat-success${categoryReps[c.key].avgSuccessRate >= 70 ? ' good' : ''}">Ø ${categoryReps[c.key].avgSuccessRate}% erfolgreich</span>` : ""}
        </div>
      `
      : "";
    return `
      <div class="cat-stat-card">
        <div class="cat-stat-value">${categoryCounts[c.key]}<span class="cat-stat-unit">${c.countUnit}</span></div>
        <div class="cat-stat-label">${c.countLabel}</div>
        ${extra}
      </div>
    `;
  }).join("");
}

let selectedDate = todayISO();
let checklistState = {};

function renderChecklist(entry){
  CATEGORIES.forEach(c => {
    checklistState[c.key] = !!entry[c.key];
    if (c.trackReps){
      checklistState[c.key + "_reps"] = entry[c.key + "_reps"] ?? "";
      checklistState[c.key + "_success"] = entry[c.key + "_success"] ?? "";
    }
  });
  paintChecklist();
}

function successRateText(reps, success){
  const r = Number(reps), s = Number(success);
  if (!reps || success === "" || success === null || success === undefined || isNaN(s)) return "";
  const pct = Math.round((s / r) * 100);
  return `${pct}% erfolgreich${pct >= 70 ? " ✓" : ""}`;
}

function paintChecklist(){
  const el = document.getElementById("checklist");
  if (!el) return;
  el.innerHTML = CATEGORIES.map(c => `
    <div class="check-item ${checklistState[c.key] ? 'active' : ''}" data-key="${c.key}">
      <label class="check-item-header">
        <input type="checkbox" ${checklistState[c.key] ? "checked" : ""} data-key="${c.key}" />
        <span class="txt">${c.label}${c.hint ? `<span class="hint">${c.hint}</span>` : ""}</span>
      </label>
      ${c.trackReps ? `
        <div class="reps-row">
          <div class="reps-field">
            <label>${c.repsLabel}</label>
            <input type="number" min="0" class="reps-input" data-key="${c.key}" data-role="reps" value="${checklistState[c.key + '_reps']}" placeholder="0" />
          </div>
          <div class="reps-field">
            <label>${c.successLabel}</label>
            <input type="number" min="0" class="reps-input" data-key="${c.key}" data-role="success" value="${checklistState[c.key + '_success']}" placeholder="0" />
          </div>
          <div class="reps-rate" data-rate-for="${c.key}">${successRateText(checklistState[c.key + '_reps'], checklistState[c.key + '_success'])}</div>
        </div>
      ` : ""}
    </div>
  `).join("");

  el.querySelectorAll("input[type=checkbox]").forEach(input => {
    input.onchange = () => {
      const key = input.dataset.key;
      checklistState[key] = input.checked;
      input.closest(".check-item").classList.toggle("active", input.checked);
    };
  });

  el.querySelectorAll(".reps-input").forEach(input => {
    input.oninput = () => {
      const key = input.dataset.key;
      const role = input.dataset.role;
      checklistState[`${key}_${role}`] = input.value;
      const rateEl = el.querySelector(`.reps-rate[data-rate-for="${key}"]`);
      if (rateEl) rateEl.textContent = successRateText(checklistState[`${key}_reps`], checklistState[`${key}_success`]);
    };
  });
}

async function saveEntry(){
  const statusEl = document.getElementById("save-status");
  const confirmEl = document.getElementById("save-confirmation");
  confirmEl.style.display = "none";
  statusEl.textContent = "Speichere …";
  statusEl.className = "save-status";

  const row = { user_id: currentUser.id, entry_date: selectedDate, reflexion: reflexionText || null };
  CATEGORIES.forEach(c => {
    row[c.key] = !!checklistState[c.key];
    if (c.trackReps){
      const repsVal = checklistState[c.key + "_reps"];
      const successVal = checklistState[c.key + "_success"];
      row[c.key + "_reps"] = (repsVal === "" || repsVal === null || repsVal === undefined) ? null : parseInt(repsVal, 10);
      row[c.key + "_success"] = (successVal === "" || successVal === null || successVal === undefined) ? null : parseInt(successVal, 10);
    }
  });

  const { error } = await sb
    .from("training_entries")
    .upsert(row, { onConflict: "user_id,entry_date" });

  if (error){
    statusEl.textContent = "Fehler: " + error.message;
    return;
  }

  await loadEntries();
  statusEl.textContent = "";
  confirmEl.style.display = "block";
  renderChart14();
  document.querySelector(".table-scroll").innerHTML = renderHistoryTable();
  updateStatCardsOnly();
}

function updateStatCardsOnly(){
  const stats = computeStats();
  const goalTarget = weeklyGoal?.target_days || null;
  const grid = document.querySelector(".stats-grid-top");
  if (grid){
    grid.innerHTML = `
      <div class="stat-card">
        <div class="label">Trainingstage</div>
        <div class="value">${stats.trainingsTage}<span class="unit">Tage</span></div>
      </div>
      <div class="stat-card">
        <div class="label">Aktuelle Serie</div>
        <div class="value">${stats.streak}<span class="unit">Tage in Folge</span></div>
        <div class="paw-streak">${renderPawStreak(stats.streak)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Wochenziel</div>
        <div class="value">${stats.weekDaysTrained}<span class="unit">${goalTarget ? `von ${goalTarget} Tagen` : 'Tage diese Woche'}</span></div>
      </div>
    `;
  }
  const catGrid = document.querySelector(".category-stats-grid");
  if (catGrid){
    catGrid.innerHTML = renderCategoryStats(stats.categoryCounts, stats.categoryReps);
  }
}

function renderChart14(){
  const days = [];
  for (let i=13; i>=0; i--) days.push(isoDaysAgo(i));

  const values = days.map(iso => {
    const entry = currentEntries.find(e => e.entry_date === iso);
    return entry ? countChecked(entry) : 0;
  });
  const labels = days.map(iso => `${weekdayShortDE(iso)} ${iso.slice(8,10)}.${iso.slice(5,7)}`);

  const ctx = document.getElementById("chart14");
  if (!ctx) return;
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Erledigte Kategorien",
        data: values,
        backgroundColor: "#AE8B5C",
        borderRadius: 5,
        maxBarThickness: 28,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, max: CATEGORIES.length, ticks: { stepSize: 2, font: { family: "Inter" } }, grid: { color: "#E6E2D9" } },
        x: { ticks: { font: { family: "Inter", size: 11 } }, grid: { display: false } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function renderCategoryCell(entry, c){
  if (c.trackReps){
    const reps = entry[c.key + "_reps"];
    const success = entry[c.key + "_success"];
    if (reps !== null && reps !== undefined){
      if (success !== null && success !== undefined){
        const pct = reps ? Math.round((success / reps) * 100) : 0;
        return `<span class="${pct >= 70 ? 'reps-cell good' : 'reps-cell'}">${success}/${reps}<span class="reps-cell-pct">${pct}%</span></span>`;
      }
      return `<span class="reps-cell">${reps}</span>`;
    }
    // Ältere Einträge ohne Wiederholungszahlen: Fallback auf einfachen Punkt
    return `<span class="dot ${entry[c.key] ? 'yes' : 'no'}"></span>`;
  }
  return `<span class="dot ${entry[c.key] ? 'yes' : 'no'}"></span>`;
}

function renderHistoryTable(){
  if (!currentEntries.length){
    return `<div class="empty-state">Noch keine Einträge vorhanden. Trag dein erstes Training oben ein!</div>`;
  }
  const sorted = [...currentEntries].sort((a,b) => b.entry_date.localeCompare(a.entry_date));
  return `
    <table class="history">
      <thead>
        <tr>
          <th>Datum</th>
          ${CATEGORIES.map(c => `<th>${c.label}</th>`).join("")}
          <th>Reflexion</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map(e => `
          <tr>
            <td><strong>${formatDateDE(e.entry_date)}</strong></td>
            ${CATEGORIES.map(c => `<td>${renderCategoryCell(e, c)}</td>`).join("")}
            <td class="reflexion-cell">${e.reflexion ? escapeHtml(e.reflexion) : "–"}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

/* =========================================================
   BOOTSTRAP / AUTH LISTENER
   ========================================================= */
async function boot(){
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user){
    currentUser = session.user;
    renderApp();
  } else {
    renderAuth();
  }
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_IN" && session?.user){
    currentUser = session.user;
    selectedDate = todayISO();
    renderApp();
  }
  if (event === "SIGNED_OUT"){
    currentUser = null;
    currentEntries = [];
    authMode = "login";
    renderAuth();
  }
});

boot();
</script>
